<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>My Data Page</title>
  <style>
    :root {
      --bg: #f5f7fb;
      --card: #ffffff;
      --text: #0f172a;
      --muted: #475569;
      --accent: #0ea5e9;
      --accent-soft: #e0f2fe;
      --border: #dbeafe;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
      background: radial-gradient(circle at top left, #e0f2fe 0%, var(--bg) 50%, #f8fafc 100%);
      color: var(--text);
      min-height: 100vh;
    }

    .container {
      max-width: 1000px;
      margin: 0 auto;
      padding: 2rem 1rem 3rem;
    }

    .hero {
      background: linear-gradient(135deg, #0ea5e9, #0284c7);
      color: white;
      padding: 2rem;
      border-radius: 18px;
      box-shadow: 0 10px 24px rgba(2, 132, 199, 0.2);
      margin-bottom: 1.5rem;
    }

    .hero h1 {
      margin: 0 0 0.5rem;
      font-size: clamp(1.5rem, 4vw, 2.4rem);
    }

    .hero p {
      margin: 0;
      opacity: 0.95;
    }

    .metrics {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      gap: 1rem;
      margin-bottom: 1.5rem;
    }

    .metric-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 1rem;
      box-shadow: 0 4px 14px rgba(15, 23, 42, 0.05);
    }

    .metric-label {
      color: var(--muted);
      font-size: 0.9rem;
      margin-bottom: 0.4rem;
    }

    .metric-value {
      font-size: 1.4rem;
      font-weight: 700;
    }

    .table-wrap {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 14px;
      overflow: hidden;
      box-shadow: 0 4px 14px rgba(15, 23, 42, 0.05);
    }

    table {
      width: 100%;
      border-collapse: collapse;
    }

    th, td {
      padding: 0.85rem 1rem;
      text-align: left;
      border-bottom: 1px solid #e2e8f0;
      font-size: 0.95rem;
    }

    th {
      background: var(--accent-soft);
      color: #075985;
      font-weight: 700;
    }

    tr:last-child td {
      border-bottom: none;
    }

    .footer-note {
      color: var(--muted);
      margin-top: 1rem;
      font-size: 0.9rem;
    }

    @media (max-width: 640px) {
      th, td { font-size: 0.88rem; padding: 0.7rem; }
      .hero { padding: 1.4rem; }
    }
  </style>
</head>
<body>
  <main class="container">
    <section class="hero">
      <h1 id="pageTitle">My Data Dashboard</h1>
      <p id="pageSubtitle">A one-page website showing my information.</p>
    </section>

    <section class="metrics" id="metrics"></section>

    <section class="table-wrap">
      <table>
        <thead>
          <tr id="tableHeaders"></tr>
        </thead>
        <tbody id="tableRows"></tbody>
      </table>
    </section>

    <p class="footer-note">Edit the data object inside this file to display your own data.</p>
  </main>

  <script>
    // Replace this with your own data.
    const data = {
      title: "Sales Summary",
      subtitle: "Data updated monthly",
      metrics: [
        { label: "Total Orders", value: "1,254" },
        { label: "Revenue", value: "$37,920" },
        { label: "Customers", value: "436" },
        { label: "Growth", value: "+12.4%" }
      ],
      table: {
        columns: ["Month", "Orders", "Revenue", "Status"],
        rows: [
          ["January", "360", "$10,200", "Good"],
          ["February", "415", "$12,040", "Great"],
          ["March", "479", "$15,680", "Excellent"]
        ]
      }
    };

    document.getElementById("pageTitle").textContent = data.title;
    document.getElementById("pageSubtitle").textContent = data.subtitle;

    const metricsEl = document.getElementById("metrics");
    data.metrics.forEach((item) => {
      const card = document.createElement("article");
      card.className = "metric-card";
      card.innerHTML = `
        <div class="metric-label">${item.label}</div>
        <div class="metric-value">${item.value}</div>
      `;
      metricsEl.appendChild(card);
    });

    const headersEl = document.getElementById("tableHeaders");
    data.table.columns.forEach((col) => {
      const th = document.createElement("th");
      th.textContent = col;
      headersEl.appendChild(th);
    });

    const rowsEl = document.getElementById("tableRows");
    data.table.rows.forEach((row) => {
      const tr = document.createElement("tr");
      row.forEach((cell) => {
        const td = document.createElement("td");
        td.textContent = cell;
        tr.appendChild(td);
      });
      rowsEl.appendChild(tr);
    });
  </script>
</body>
</html>
